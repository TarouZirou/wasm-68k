[advisories]
# wayland-scannerのビルド時に、同梱済みの信頼済みXMLだけを解析する経路。
# アプリケーションはquick-xmlをリンクせず、外部XMLも受け取らない。
ignore = ["RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
confidence-threshold = 0.8
allow = [
    "GPL-2.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
